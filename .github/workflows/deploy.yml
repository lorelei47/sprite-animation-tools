# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：当代码推送到 main 分支时执行
on:
  push:
    branches: ["main"]

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 工作流任务
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 GitHub Pages 环境
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. 上传静态文件（适配 AI Studio 项目结构）
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 重点：指定静态文件目录
          # 如果你的 AI Studio 项目静态文件在根目录，用 path: '.'
          # 如果在 public 目录，用 path: 'public'
          path: '.'

      # 4. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
